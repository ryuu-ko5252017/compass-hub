<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>オフラインQRコードコンパス</title>
    <link rel="manifest" href="./manifest.json">    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #ffbf00; font-family: sans-serif; overflow: hidden; text-align: center; display: flex; flex-direction: column; height: 100vh; }
        #controls { background: #222; padding: 10px; display: flex; flex-direction: column; gap: 8px; border-bottom: 2px solid #333; z-index: 10; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { background: #444; color: #ffbf00; border: 1px solid #ffbf00; padding: 12px; font-size: 14px; border-radius: 5px; font-weight: bold; }
        button:active { background: #ffbf00; color: #000; }
        select { background: #333; color: #fff; padding: 12px; width: 100%; border-radius: 5px; font-size: 16px; border: 1px solid #666; -webkit-appearance: none; }
        #video { width: 100%; height: 35vh; object-fit: cover; background: #111; display: none; }
        #display-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; position: relative; }
        #arrow { font-size: 150px; transition: transform 0.1s; display: inline-block; line-height: 1; }
        #info { font-size: 22px; font-weight: bold; margin-top: 10px; }
        .status { font-size: 14px; color: #aaa; margin: 2px; }
        #loc-info { font-family: monospace; }
        /* カスタム地点用のスタイル */
        .custom-point { color: #00ff00 !important; }
    </style>
</head>
<body>
    <div id="controls">
        <select id="point-selector" onchange="handleSelectionChange()">
            <option value="">-- 地点を選択 --</option>
            <option value="SCAN">📷 QRコードをスキャン</option>
            <optgroup label="デフォルト地点">
                <option value="35.0116,135.7681">京都市役所</option>
                <option value="35.0312,135.8744">滋賀里駅周辺</option>
                <option value="35.0035,135.8648">大津市役所</option>
            </optgroup>
            <optgroup id="custom-points-group" label="マイ登録地点">
                </optgroup>
        </select>
        <div class="btn-group">
            <button onclick="applyLocation('current')">現在地に設定</button>
            <button onclick="applyLocation('target')">目的地に設定</button>
            <button onclick="addLocationFromClipboard()" style="grid-column: span 2; background: #335;">📋 コピーした座標を登録</button>
        </div>
    </div>

    <video id="video" autoplay playsinline muted></video>

    <div id="display-area">
        <div id="status-text" class="status">地点を設定してください</div>
        <div id="arrow">↑</div>
        <div id="info">距離: ---m</div>
        <div id="loc-info" class="status">自: 未 / 至: 未</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const arrow = document.getElementById('arrow');
        const info = document.getElementById('info');
        const statusText = document.getElementById('status-text');
        const locInfo = document.getElementById('loc-info');
        const pointSelector = document.getElementById('point-selector');
        const customGroup = document.getElementById('custom-points-group');

        let currentPos = null;
        let targetPos = null;
        let deviceHeading = 0;
        let smoothedHeading = 0;
        const alpha = 0.15;
        let scanActive = false;
        let videoStream = null;

        // アプリ起動時に保存済み地点を読み込む
        window.onload = () => {
            loadSavedPoints();
        };

        function handleSelectionChange() {
            if (pointSelector.value === "SCAN") startScan();
            else stopScan();
        }

        async function startScan() {
            if (scanActive) return;
            statusText.innerText = "カメラ起動中...";
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                video.srcObject = videoStream;
                video.style.display = "block";
                await video.play();
                scanActive = true;
                statusText.innerText = "QRスキャン中...";
                requestAnimationFrame(tick);
            } catch (err) {
                statusText.innerText = "カメラエラー";
                alert("カメラを起動できません");
            }
        }

        function stopScan() {
            scanActive = false;
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            video.style.display = "none";
        }

        // クリップボードから座標を読み取って追加
async function addLocationFromClipboard() {
    try {
        // フォーカスを戻さないと読み取れない場合があるための対策
        window.focus(); 
        
        const text = await navigator.clipboard.readText();
        
        // 緯度,経度の抽出（より広い形式に対応: スペースの有無や「北緯」等の文字混じりでも抽出可能に）
        const match = text.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);

        if (match) {
            const lat = parseFloat(match[1]);
            const lng = parseFloat(match[2]);
            
            // プロンプトを出す前に、少しだけ時間を空けるとブラウザのダイアログ競合を防げます
            setTimeout(() => {
                const name = prompt("地点の名前を入力してください", `地点 ${new Date().toLocaleTimeString()}`);
                if (name) {
                    savePoint(name, lat, lng);
                    renderCustomPoint(name, lat, lng);
                    statusText.innerText = "マイ地点を登録しました";
                }
            }, 100);
        } else {
            alert("クリップボードに有効な座標が見つかりませんでした。\nGoogleマップで「35.123, 135.456」のような形式をコピーしてください。");
        }
    } catch (err) {
        console.error(err);
        alert("座標の読み取りに失敗しました。ブラウザの「貼り付け許可」を確認してください。");
    }
}

        // LocalStorageに保存
        function savePoint(name, lat, lng) {
            let points = JSON.parse(localStorage.getItem('michibiki_points') || '[]');
            points.push({ name, lat, lng });
            localStorage.setItem('michibiki_points', JSON.stringify(points));
        }

        // 保存された地点をプルダウンに反映
        function loadSavedPoints() {
            let points = JSON.parse(localStorage.getItem('michibiki_points') || '[]');
            points.forEach(p => renderCustomPoint(p.name, p.lat, p.lng));
        }

        function renderCustomPoint(name, lat, lng) {
            const opt = document.createElement('option');
            opt.value = `${lat},${lng}`;
            opt.text = `📌 ${name}`;
            customGroup.appendChild(opt);
        }

        function applyLocation(type) {
            const val = pointSelector.value;
            if (!val || val === "SCAN") {
                alert("地点を選択してください");
                return;
            }
            const [lat, lng] = val.split(',').map(Number);
            if (type === 'target') targetPos = { lat, lng };
            else currentPos = { lat, lng };
            updateNavigation();
        }

        function tick() {
            if (!scanActive) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement("canvas");
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                if (code) {
                    const match = code.data.match(/geo:(-?\d+\.\d+),(-?\d+\.\d+)/);
                    if (match) {
                        currentPos = { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
                        statusText.innerText = "現在地を更新しました";
                        pointSelector.value = "";
                        stopScan();
                        updateNavigation();
                    }
                }
            }
            if (scanActive) requestAnimationFrame(tick);
        }

        const orientationEvent = 'ondeviceorientationabsolute' in window ? 'deviceorientationabsolute' : 'deviceorientation';
        window.addEventListener(orientationEvent, e => {
            let rawHeading = 0;
            if (e.webkitCompassHeading !== undefined) rawHeading = e.webkitCompassHeading;
            else if (e.alpha !== null) rawHeading = (360 - e.alpha);
            let diff = rawHeading - smoothedHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            smoothedHeading += alpha * diff;
            deviceHeading = (smoothedHeading + 360) % 360;
            updateNavigation();
        }, true);

        function updateNavigation() {
            if (!currentPos || !targetPos) {
                locInfo.innerText = `自: ${currentPos?'OK':'未'} / 至: ${targetPos?'OK':'未'}`;
                return;
            }
            const bearing = calculateBearing(currentPos.lat, currentPos.lng, targetPos.lat, targetPos.lng);
            const distance = calculateDistance(currentPos.lat, currentPos.lng, targetPos.lat, targetPos.lng);
            let relativeAngle = bearing - deviceHeading;
            arrow.style.transform = `rotate(${relativeAngle}deg)`;
            
            // 1km以上の場合は単位をkmに変更
            if (distance >= 1000) {
                info.innerText = `距離: ${(distance/1000).toFixed(2)}km`;
            } else {
                info.innerText = `距離: ${Math.round(distance)}m`;
            }

            locInfo.innerText = `自:${currentPos.lat.toFixed(3)},${currentPos.lng.toFixed(3)} / 至:${targetPos.lat.toFixed(3)},${targetPos.lng.toFixed(3)}`;
        }

        function calculateBearing(lat1, lng1, lat2, lng2) {
            const rad = Math.PI / 180;
            const y = Math.sin((lng2 - lng1) * rad) * Math.cos(lat2 * rad);
            const x = Math.cos(lat1 * rad) * Math.sin(lat2 * rad) - Math.sin(lat1 * rad) * Math.cos(lat2 * rad) * Math.cos((lng2 - lng1) * rad);
            return Math.atan2(y, x) * 180 / Math.PI;
        }

        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371e3;
            const rad = Math.PI / 180;
            const dLat = (lat2 - lat1) * rad;
            const dLng = (lng2 - lng1) * rad;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dLng/2) * Math.sin(dLng/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // 修正前: navigator.serviceWorker.register('./sw.js')
		// 修正後: 末尾に日付などを付ける
		navigator.serviceWorker.register('./sw.js?ver=20240530')
                    .then(reg => console.log('SW登録成功'))
                    .catch(err => console.log('SW登録失敗', err));
            });
        }
    </script>
</body>
</html>
